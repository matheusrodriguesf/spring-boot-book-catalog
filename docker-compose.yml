services:
  mariadb:
    image: mariadb:11.4
    container_name: book-catalog-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: book_catalog_db
      MARIADB_USER: book_catalog_user
      MARIADB_PASSWORD: book_catalog_pass
      TZ: America/Sao_Paulo
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data: