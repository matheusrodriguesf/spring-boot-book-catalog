spring.application.name=book-catalog-api

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/book_catalog_db}
spring.datasource.username=${DB_USERNAME:book_catalog_user}
spring.datasource.password=${DB_PASSWORD:book_catalog_pass}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration